openapi: 3.1.0

info:
  title: LINE Market Intel GPT Action API
  version: 0.2.3
  description: >
    Personal LINE and Taiwan market intelligence API.
    Returns user-owned market reports, manual news, holdings, watchlist,
    strategy reports, ticker signals, sector rankings, official market snapshots,
    and manual GPT packs.

servers:
  - url: https://line-market-intel-ai-free-data-ocr.onrender.com

security:
  - apiKeyAuth: []

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    FlexibleObject:
      type: object
      description: Flexible object for API-specific payloads.
      properties:
        status:
          type: string
          description: Response status.
        summary:
          type: string
          description: Human-readable summary when available.
        message:
          type: string
          description: Human-readable message when available.
      additionalProperties: true

    FlexibleNewsSummaryResponse:
      type: object
      description: Flexible compact LINE manual news and OCR summary response.
      properties:
        status:
          type: string
          description: Response status.
        date:
          type: string
          description: Manual news bucket date.
        limit:
          type: integer
          description: Number of items requested.
        items:
          type: array
          description: Compact news items.
          items:
            $ref: "#/components/schemas/NewsItem"
        line_manual_news:
          type: array
          description: LINE manual news and OCR items.
          items:
            $ref: "#/components/schemas/NewsItem"
        data_available:
          type: boolean
          description: Whether rows are available.
        data_gaps:
          type: array
          description: Known data gaps.
          items:
            type: string
      additionalProperties: true

    SignalEngine:
      type: object
      description: Signal engine output.
      properties:
        market_bias:
          type: string
          description: Market bias, such as bullish, bearish, neutral, or range_bound.
        market_phase:
          type: string
          description: Market phase, such as trend, range_bound, pullback, or breakout.
        big_money_strategy:
          type: string
          description: Big-money strategy view, such as wait_and_see, accumulate, distribute, or rotate.
        risk_flags:
          type: array
          description: Risk flags from signal engine.
          items:
            type: string
      additionalProperties: true

    CatalystReason:
      type: object
      description: Sector or ticker catalyst reason.
      properties:
        fundamental:
          type: string
          description: Fundamental catalyst.
        chip:
          type: string
          description: Chip or fund-flow catalyst.
        technical:
          type: string
          description: Technical catalyst.
      additionalProperties: true

    SectorStrengthItem:
      type: object
      description: Sector strength item.
      properties:
        sector:
          type: string
          description: Sector name.
        strength_score:
          type: number
          description: Sector strength score.
        rank:
          type: integer
          description: Sector rank.
        reason:
          $ref: "#/components/schemas/CatalystReason"
        leaders:
          type: array
          description: Leading tickers in this sector.
          items:
            $ref: "#/components/schemas/TickerBasic"
        risk_flags:
          type: array
          items:
            type: string
      additionalProperties: true

    TickerBasic:
      type: object
      description: Basic ticker information.
      properties:
        ticker:
          type: string
          description: Taiwan stock ticker, for example 2330.
        name:
          type: string
          description: Stock name.
      additionalProperties: true

    TickerCandidateItem:
      type: object
      description: Ticker candidate item.
      properties:
        ticker:
          type: string
          description: Taiwan stock ticker.
        name:
          type: string
          description: Stock name.
        sector:
          type: string
          description: Related sector.
        candidate_type:
          type: string
          description: Candidate type, such as momentum, intraday, swing, or watchlist.
        entry_zone:
          type: string
          description: Entry zone.
        exit_zone:
          type: string
          description: Exit zone.
        stop_loss:
          type: string
          description: Stop-loss level.
        position_pct:
          type: number
          description: Suggested position percentage.
        confidence_score:
          type: number
          description: Confidence score from 0 to 100.
        sample_size:
          type: integer
          description: Sample size used for evaluation.
        risk_flags:
          type: array
          items:
            type: string
      additionalProperties: true

    HoldingItem:
      type: object
      description: User holding item.
      properties:
        ticker:
          type: string
          description: Taiwan stock ticker.
        name:
          type: string
          description: Stock name.
        shares:
          type: number
          description: Shares when provided.
        cost:
          type: number
          description: Cost basis when provided.
        market_value:
          type: number
          description: Market value when provided.
        position_pct:
          type: number
          description: Position percentage when provided.
        unrealized_pnl:
          type: number
          description: Unrealized profit or loss when provided.
        strategy:
          type: string
          description: Holding strategy.
        risk_flags:
          type: array
          items:
            type: string
      additionalProperties: true

    WatchlistItem:
      type: object
      description: Watchlist item.
      properties:
        ticker:
          type: string
          description: Taiwan stock ticker.
        name:
          type: string
          description: Stock name.
        reason:
          type: string
          description: Watchlist reason.
        alert_level:
          type: string
          description: Alert level.
      additionalProperties: true

    NewsItem:
      type: object
      description: Manual news or market news item.
      properties:
        id:
          type: string
          description: News item id.
        title:
          type: string
          description: News title.
        summary:
          type:
            - string
            - "null"
          description: News summary.
        full_text:
          type:
            - string
            - "null"
          description: Full text when available.
        has_full_text:
          type: boolean
          description: Whether a full text payload exists.
        full_text_chars:
          type: integer
          description: Full text character count when available.
        source:
          type:
            - string
            - "null"
          description: Data source name.
        source_url:
          type:
            - string
            - "null"
          description: Source URL when available.
        related_tickers:
          type: array
          items:
            type: string
        related_sectors:
          type: array
          items:
            type: string
        news_type:
          type: string
          description: News type, such as manual, public, or mops.
        event_type:
          type: string
          description: Event type, such as image_ocr, manual, or file_text.
        importance:
          type: string
          description: Importance level.
        is_mops:
          type: boolean
          description: Whether this is a MOPS event.
        interpretation_limit:
          type:
            - string
            - "null"
          description: Limitation such as title_or_summary_only.
        data_quality_score:
          type: number
          description: Data quality score from 0 to 100.
        data_gaps:
          type: array
          items:
            type: string
        collected_at:
          type:
            - string
            - "null"
        published_at:
          type:
            - string
            - "null"
        fetched_at:
          type:
            - string
            - "null"
        license_status:
          type:
            - string
            - "null"
      additionalProperties: true

    GenericResponse:
      type: object
      description: Generic response object for market intelligence endpoints.
      properties:
        status:
          type: string
          description: Response status.
        message:
          type: string
          description: Response message.
        date:
          type: string
          description: Data date.
        ai_mode:
          type: string
          description: AI mode, such as manual or auto.
        data_quality_score:
          type: number
          description: Data quality score from 0 to 100.
        data_gaps:
          type: array
          description: Missing data fields or known data gaps.
          items:
            type: string
        sample_size:
          type: integer
          description: Sample size used for strategy or signal evaluation.
        backtest_available:
          type: boolean
          description: Whether backtest data is available.
        confidence_score:
          type: number
          description: Confidence score from 0 to 100.
        signal_engine:
          $ref: "#/components/schemas/SignalEngine"
        sector_strength:
          type: array
          description: Sector strength list.
          items:
            $ref: "#/components/schemas/SectorStrengthItem"
        ticker_candidates:
          type: array
          description: Ticker candidate list.
          items:
            $ref: "#/components/schemas/TickerCandidateItem"
        holdings:
          type: array
          description: User holdings.
          items:
            $ref: "#/components/schemas/HoldingItem"
        watchlist:
          type: array
          description: User watchlist.
          items:
            $ref: "#/components/schemas/WatchlistItem"
        line_manual_news:
          type: array
          description: LINE manual news list.
          items:
            $ref: "#/components/schemas/NewsItem"
        items:
          type: array
          description: Compact news items or generic endpoint item rows.
          items:
            $ref: "#/components/schemas/NewsItem"
        data_available:
          type: boolean
          description: Whether the endpoint returned usable data.
        empty_reason:
          type:
            - string
            - "null"
          description: Reason when no data is available.
        strategy_report:
          $ref: "#/components/schemas/FlexibleObject"
        official_market_snapshot:
          $ref: "#/components/schemas/FlexibleObject"
        manual_gpt_pack:
          $ref: "#/components/schemas/FlexibleObject"
        result:
          $ref: "#/components/schemas/FlexibleObject"
      additionalProperties: true

    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Open-ended market intelligence query.

paths:
  /gpt/reports/today:
    get:
      operationId: getTodayReport
      summary: Get today's Taiwan market report
      description: >
        Use for today's market, TAIEX, Taiwan futures, intraday direction,
        market bias, market phase, big money strategy, risk flags, sector strength,
        ticker candidates, data quality score, and data gaps.
      responses:
        "200":
          description: Today's market report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/reports/{date}:
    get:
      operationId: getReportByDate
      summary: Get market report by date and type
      description: Use for premarket, intraday, postmarket, or weekly reports.
      parameters:
        - name: date
          in: path
          required: true
          description: Report date in YYYY-MM-DD format.
          schema:
            type: string
            format: date
        - name: type
          in: query
          required: false
          description: Report type.
          schema:
            type: string
            enum:
              - premarket
              - intraday
              - postmarket
              - weekly
      responses:
        "200":
          description: Report for the requested date and type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/tickers/{ticker}/today:
    get:
      operationId: getTickerToday
      summary: Get today's ticker signal
      description: >
        Use for a specific Taiwan stock ticker. Returns today's signal data,
        technical view, chip data, liquidity, volatility, risk flags,
        intraday strategy, confidence score, data quality score, and data gaps.
      parameters:
        - name: ticker
          in: path
          required: true
          description: Taiwan stock ticker, for example 2330.
          schema:
            type: string
      responses:
        "200":
          description: Today's ticker signal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/tickers/{ticker}/history:
    get:
      operationId: getTickerHistory
      summary: Get ticker history
      description: >
        Use for recent price, volume, volatility, technical structure,
        chip changes, support/resistance, and sample-size checks.
      parameters:
        - name: ticker
          in: path
          required: true
          description: Taiwan stock ticker, for example 2330.
          schema:
            type: string
        - name: days
          in: query
          required: false
          description: Number of historical days to return. Default is 20.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 120
      responses:
        "200":
          description: Ticker historical data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/sectors/today:
    get:
      operationId: getTodaySectors
      summary: Get today's sector rankings
      description: >
        Use for sector strength, theme rotation, strong groups,
        leading stocks, watchlist candidates, and ticker candidates.
      responses:
        "200":
          description: Today's sector rankings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/holdings:
    get:
      operationId: getHoldings
      summary: Get user holdings and watchlist
      description: >
        Returns the user's actual holdings and watchlist when available.
        Do not infer holdings, cost basis, shares, leverage, or capital allocation
        that are not returned by this endpoint.
      responses:
        "200":
          description: User holdings and watchlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/news/today/summary:
    get:
      operationId: getTodayNewsSummary
      summary: Get today's compact LINE manual news and OCR summaries
      description: >
        Returns compact LINE manual news, OCR image/file summaries,
        related tickers, related sectors, data quality, data gaps,
        and interpretation limits. Use this endpoint for LINE-transmitted
        news, screenshots, OCR text, manual notes, and file-extracted summaries.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of news items to return.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Today's compact news summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleNewsSummaryResponse"

  /gpt/manual-pack/{date}:
    get:
      operationId: getManualPack
      summary: Get manual GPT pack by date
      description: >
        Returns the manual GPT pack for a specific date.
        Use when the user asks for manually prepared market intelligence
        or when ai_mode is manual.
      parameters:
        - name: date
          in: path
          required: true
          description: Manual pack date in YYYY-MM-DD format.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Manual GPT pack.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"

  /gpt/query:
    post:
      operationId: queryMarketIntel
      summary: Open-ended market intelligence query
      description: >
        Use only when no specific endpoint matches the user's request.
        The returned result must still be treated as closed-source data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"
